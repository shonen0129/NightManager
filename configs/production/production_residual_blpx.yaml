model:
  name: production_residual_blpx
  display_name: "Production Residual-BLPX Enhanced BLPX"
  short_name: "Residual-BLPX"
  version: "production_residual_blpx_v1"

signal_components:
  residual_blpx:
    enabled: true
    weight: 1.0
  raw_pca:
    enabled: false
    weight: 0.0
  residual_pca:
    enabled: false
    weight: 0.0
  raw_blpx:
    enabled: false
    weight: 0.0

final_signal:
  type: residual_blpx_only
  formula: z(Residual-BLPX)

portfolio:
  long_short_frac: 0.3
  n_assets: 17
  weight_mode: signal
  net_target: 0.0

risk:
  max_gross_exposure: 2.0
  max_net_exposure: 0.05
  var_confidence: 0.99
  var_window: 250
  var_warning: 0.02
  var_stop: 0.03
  es_warning: 0.025
  es_stop: 0.04
  daily_loss_warning: 0.015
  daily_loss_stop: 0.025
  monthly_loss_stop: 0.05

costs:
  slippage_bps_per_side: 5

blpx:
  param_set: phase1d_optimized_residual_blpx_production
  rho: 0.01
  alpha_xx: 0.20
  alpha_yx: 0.15
  alpha_yy: 0.50
  lambda_pca: 0.10
  lambda_sector: 0.60
  beta_conf: 0.25
  winsor_sigma: 3.0
  blp_window: 504
  ewma_halflife: 120
  sector_eta: 0.5
  sector_gamma: 4.0
  execution_target_cost_adjustment: none
  target: topix_residual
  use_raw_target: false
  asymmetry_mode: "scalar"
  asymmetry_delta: 0.30
  gap_open_coef_neg: 0.60
  topix_beta_coef_neg: 0.60

residualization:
  enabled_for_p3: true
  jp_market_proxy: TOPIX
  beta_window: 60
  beta_winsor_sigma: 3.0
  beta_shrinkage: 0.05
  method: rolling_ols
  lookahead_safe: true

# --- Fractional Differentiation (本番適用: 2026-07-21) ---
# US return series are transformed via fractional differencing to preserve
# long memory while maintaining stationarity. Walk-forward validation
# (2015-2026, 12 yearly windows) confirmed d=0.1 outperforms d=1.0 baseline
# in 12/12 windows (mean Sharpe 8.87 vs 7.75, turnover -3%).
# See: López de Prado (2018), "Advances in Financial Machine Learning", Ch.5
# Validation report: reports/fractional_diff_walkforward_audit_report.md
features:
  fractional_diff:
    enabled: true
    d: 0.1
    threshold: 1.0e-5
    window: 100

fallback:
  enabled: true
  fallback_model: SRE
  fallback_on_audit_failure: true
  fallback_on_missing_data: true
  fallback_on_invalid_confidence_variance: true
  fallback_on_sector_prior_error: true

audit:
  enforce_signal_weighting: true
  forbid_uniform_weighting: true
  check_date_alignment: true
  check_residualization_leakage: true
  check_cost_consistency: true
  check_weight_constraints: true

output:
  base_dir: results/production_residual_blpx
  live_dir: live/production_residual_blpx
  save_signals: true
  save_weights: true
  save_plots: true
  run_audit: true
