run:
  mode: "backtest"
  start_date: "2009-07-10"
  end_date: "2026-05-28"
  random_seed: 42
  timezone: "Asia/Tokyo"

target:
  primary_target: "open_to_close_residual"
  allowed_targets:
    - "open_to_close_residual"
    - "entry_to_close_residual"
    - "true_0910_to_close_residual"
  separate_true_0910_report: true
  use_close_to_close_as_reference_only: true

portfolio:
  aum_jpy: 1000000
  gross_targets: [0.5, 0.75, 1.0]
  default_gross_target: 0.5
  adv_cap: 0.20
  integer_rounding: true
  lot_size_default: 1
  max_abs_weight_per_name: 0.25
  min_order_value_jpy: 1000

costs:
  commission_bps: 0.0
  buy_interest_annual: 0.025
  sell_interest_annual: 0.0
  borrow_fee_annual: 0.0115
  reverse_fee_bps_per_day_scenarios: [0, 5, 10, 30]
  spread_fallback_roundtrip_bps: [5, 10, 15, 20, 30, 50]
  default_spread_fallback_roundtrip_bps: 15

features:
  base_signal_column: "signal_gap_adjusted"
  base_mu_column: "mu_base"
  rolling_zscore_windows: [60, 120, 252]
  default_zscore_window: 120
  hinge_thresholds: [1.0, 1.5, 2.0]
  hinge_directions: ["positive", "negative"]

  max_raw_interaction_features: 250
  max_selected_features: 25

  interaction_groups:
    macro_x_asset_beta:
      enabled: true
      macro_columns:
        - "us10y_change"
        - "usd_jpy_return"
        - "vix_return"
        - "nikkei_futures_return"
        - "topix_futures_return"
      beta_windows: [120, 252]
      default_beta_window: 120

    us_sector_x_sector_exposure:
      enabled: true
      us_sector_columns:
        - "us_tech_return"
        - "us_semiconductor_return"
        - "us_energy_return"
        - "us_financial_return"
        - "us_industrial_return"
        - "us_healthcare_return"
        - "us_smallcap_return"
      exposure_methods:
        - "static_sector_map"
        - "rolling_beta"
      beta_windows: [120, 252]

    regime_x_base_signal:
      enabled: true
      regime_columns:
        - "vix_return"
        - "realized_vol_20d"
        - "cross_sectional_dispersion"
        - "topix_intraday_vol"
      interaction_with:
        - "signal_gap_adjusted"

    gap_asset_specific:
      enabled: true
      gap_columns:
        - "jp_open_gap"
        - "entry_gap"
        - "gap_surprise"
      require_asset_specific: true

exposures:
  rolling_beta:
    method: "ridge_shrinkage"
    windows: [120, 252]
    min_obs: 60
    shrinkage_alpha: 10.0
    lag_days: 1
    standardize_exposures_cross_sectionally: true

  static_sector_map:
    path: "configs/sector_exposure_map.yaml"
    fallback: "zero"
    normalize_rows: false

feature_selection:
  enabled: true
  method: "benjamini_hochberg_fdr"
  fdr_q: 0.10
  min_abs_rank_ic: 0.015
  min_sign_consistency: 0.55
  max_features_after_fdr: 25
  use_train_period_only: true
  bootstrap_by_date: true
  require_nonzero_within_date_std: true

model:
  baseline_model: "net_score_ranking"
  target_mode: "residual_overlay"
  prediction_formula: "mu_final = mu_base + alpha * delta_interaction"

  overlay_models:
    - "macro_hinge_x_asset_beta_ridge"
    - "macro_hinge_x_asset_beta_elasticnet"
    - "us_sector_hinge_x_sector_exposure_ridge"
    - "us_sector_hinge_x_sector_exposure_elasticnet"
    - "regime_hinge_x_base_signal_ridge"
    - "regime_hinge_x_base_signal_elasticnet"
    - "gap_hinge_asset_specific_ridge"
    - "gap_hinge_asset_specific_elasticnet"
    - "combined_interaction_ridge"
    - "combined_interaction_elasticnet"

  alpha_blend_grid: [0.0, 0.25, 0.5, 0.75, 1.0]

  ridge_alpha_grid: [0.1, 1.0, 10.0, 100.0, 300.0]

  elasticnet_alpha_grid: [0.0001, 0.001, 0.01, 0.1]
  elasticnet_l1_ratio_grid: [0.1, 0.3, 0.5, 0.7]

  cap_overlay_prediction: true
  max_overlay_to_base_abs_ratio: 0.5
  max_overlay_bps: 20

validation:
  walk_forward: true
  train_window_days: 252
  validation_window_days: 63
  test_window_days: 21
  step_days: 21
  date_grouped_split: true
  purge_days: 1
  compare_targets:
    - "open_to_close_residual"
    - "entry_to_close_residual"
  true_0910_subsample_report: true

evaluation:
  metrics:
    - "rank_ic"
    - "rank_icir"
    - "pearson_ic"
    - "hit_rate"
    - "quantile_return"
    - "long_short_spread_bps"
    - "annualized_net_return"
    - "annualized_vol"
    - "IR"
    - "max_drawdown"
    - "turnover"
    - "effective_gross"
    - "feature_stability"
    - "cost_sensitivity"
    - "rank_change"
    - "basket_overlap"
    - "overlay_nonzero_rate"
    - "within_date_feature_std"

  quantiles: [0.3, 0.7]

  adoption_criteria:
    min_annual_net_return_improvement: 0.03
    min_ir_improvement: 0.20
    max_dd_worsening_allowed: 0.00
    max_turnover_increase_ratio: 0.20
    max_rank_corr_to_baseline: 0.995
    min_selected_name_change_rate: 0.05
    min_overlay_nonzero_rate: 0.10

data:
  prices_path: null
  signals_path: null
  targets_path: "artifacts/sprint1/targets_panel.parquet"
  sprint2_results_path: "artifacts/sprint2_cost_aware_aum1m/"
  sprint3a_results_path: "artifacts/sprint3a_hinge_features/"
  feature_cache_path: "artifacts/sprint3b_hinge_interactions/feature_cache.parquet"

output:
  report_dir: "reports/sprint3b_hinge_interactions"
  artifact_dir: "artifacts/sprint3b_hinge_interactions"
  figure_dir: "reports/sprint3b_hinge_interactions/figures"
