# =============================================================================
# nonlinear_correction.yaml – 非線形補正層 設定ファイル雛形
# =============================================================================
# このファイルは NonlinearCorrectionLayer.from_config() で読み込まれます。
# 設定値の変更は投資委員会の承認事項です（運用方針書 §9.2 参照）。
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# 補正層全般
# ─────────────────────────────────────────────────────────────────────────────
correction:
  enabled: true             # false にすると predict() は z_lin をそのまま返す
  library: lightgbm         # "lightgbm" または "xgboost"
  multi_output_mode: single # "single" (推奨)  or "per_sector"
  n_factors: 6              # K: ファクタースコア次元数（変更禁止）
  n_sectors: 17             # N_J: 日本業種数（変更禁止）
  seed: 42                  # 再現性のための乱数シード

# ─────────────────────────────────────────────────────────────────────────────
# GBT ハイパーパラメータ（強制制約付き）
# ─────────────────────────────────────────────────────────────────────────────
hyperparams:
  max_depth: 2              # [2 or 3] 低次交互作用のみ。デフォルト2。
  n_estimators: 100         # [10, 200] early_stopping有効時の上限。
  learning_rate: 0.02       # [0.005, 0.10]
  min_child_samples: 30     # LightGBM: 葉1つあたりの最小サンプル数
  reg_lambda: 5.0           # L2正則化。大きいほど過学習を抑制。
  subsample: 0.70           # 行サンプリング率（各木）
  colsample_bytree: 0.70    # 列サンプリング率（各木）
  early_stopping_rounds: 20 # バリデーション改善がなければ停止
  clip_scale: 0.50          # g を ±clip_scale * |z_lin| でクリップ

# ─────────────────────────────────────────────────────────────────────────────
# 特徴量フラグ
# ─────────────────────────────────────────────────────────────────────────────
features:
  use_squared: false        # f_k^2 を特徴量に追加するか
  use_absolute: false       # |f_k| を特徴量に追加するか
  use_delta: false          # Δf_k（直近 delta_window 日の変化量）を追加するか
  delta_window: 5           # use_delta=true のときの差分ウィンドウ（営業日）

# ─────────────────────────────────────────────────────────────────────────────
# 単調性制約
# ─────────────────────────────────────────────────────────────────────────────
# default_factor_N: ファクターN に対するデフォルト制約方向
#   +1 = 非減少（ファクタースコア上昇 → シグナル非減少）
#   -1 = 非増加
#    0 = 制約なし
#
# 解釈的根拠:
#   f_0: グローバル因子   → 上昇時に全業種正方向シグナルが期待される (+1)
#   f_1: 国スプレッド因子 → 経済的方向性が不明確 (0)
#   f_2: シクリカル因子   → 制約なし (0)
#   f_3: 為替感応度       → 制約なし (0)
#   f_4: エネルギー価格   → 制約なし (0)
#   f_5: インフレ感応度   → 制約なし (0)
#
# 注意: 制約方向を変更する場合は投資委員会の承認が必要です。
monotone_constraints:
  default_f_0: 1
  default_f_1: 0
  default_f_2: 0
  default_f_3: 0
  default_f_4: 0
  default_f_5: 0
  # 業種別オーバーライド例:
  # overrides:
  #   sector_3_f_0: -1   # 業種3はグローバル因子上昇で逆方向

# ─────────────────────────────────────────────────────────────────────────────
# 時系列 Walk-Forward CV
# ─────────────────────────────────────────────────────────────────────────────
cv:
  n_splits: 5               # Walk-forward のフォールド数
  train_size: null          # null=拡大窓、整数=固定ローリング窓（営業日数）
  gap_purge: 1              # 予測対象重複除去日数（1=翌日予測）
  embargo: 5                # ウォームアップ除外日数（境界前後のバッファ）
  min_train_size: 120       # 学習フォールドの最小サンプル数

# ─────────────────────────────────────────────────────────────────────────────
# 取引コストモデル
# ─────────────────────────────────────────────────────────────────────────────
cost_model:
  commission_rate: 0.0005   # 片道手数料率（5bps）
  spread_rate: 0.0003       # スプレッドコスト（3bps）
  impact_rate: 0.0002       # マーケットインパクト（2bps）

# ─────────────────────────────────────────────────────────────────────────────
# 採用判定閾値
# ─────────────────────────────────────────────────────────────────────────────
thresholds:
  contribution_cap: 0.30    # |g|/|z_lin| ポートフォリオ平均の警告閾値
  significance_level: 0.05  # DSR補正後 p値 の有意水準

# ─────────────────────────────────────────────────────────────────────────────
# Walk-Forward 検証スクリプトの設定
# ─────────────────────────────────────────────────────────────────────────────
walk_forward:
  start_date: "2015-01-01"       # バックテスト開始日（IS + OOS 全体）
  oos_start_date: "2020-01-01"   # OOS（アウトオブサンプル）評価開始日
  window_mode: expanding         # "expanding" または "rolling"
  rolling_window_days: 1260      # window_mode=rolling の場合の訓練ウィンドウ
  output_dir: "results/correction_walkforward"
