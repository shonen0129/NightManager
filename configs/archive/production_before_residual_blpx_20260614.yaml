model:
  name: sector_relative_ensemble
  display_name: "Sector Relative Ensemble"
  short_name: "SRE"
  version: "production_v1"

ensemble:
  type: signal_level
  raw_pca_weight: 0.5
  residual_pca_weight: 0.5
  normalization: zscore

portfolio:
  long_short_frac: 0.3
  n_assets: 17
  weight_mode: signal
  net_target: 0.0

risk:
  # §5.7 ポジション制限: グロスエクスポージャーは標準100%、最大200%
  max_gross_exposure: 2.0
  max_net_exposure: 0.05
  # §8.2 目標リスク水準 / §8.4 VaR・ES
  var_confidence: 0.99
  var_window: 250
  var_warning: 0.02
  var_stop: 0.03
  es_warning: 0.025
  es_stop: 0.04
  daily_loss_warning: 0.015
  daily_loss_stop: 0.025
  monthly_loss_stop: 0.05


costs:
  slippage_bps_per_side: 5

residualization:
  enabled_for_p3: true
  jp_market_proxy: TOPIX
  beta_window: 60
  method: rolling_ols
  lookahead_safe: true

audit:
  enforce_signal_weighting: true
  forbid_uniform_weighting: true
  check_date_alignment: true
  check_residualization_leakage: true
  check_cost_consistency: true
  check_weight_constraints: true

output:
  base_dir: results/sector_relative_ensemble
  live_dir: live/sector_relative_ensemble
  save_signals: true
  save_weights: true
  save_plots: true
  run_audit: true
