# =============================================================================
# gp_uncertainty.yaml – ガウス過程回帰 不確実性推定モジュール 設定ファイル雛形
# =============================================================================
# このファイルは GPUncertaintyModule.from_config() で読み込まれます。
# 設定値の変更は投資委員会の承認事項です（運用方針書 §9.x 参照）。
#
# 本モジュールの役割:
#   方向予測の置換ではなく、「確信度ベースのエクスポージャー調整」。
#   w_final = κ_t × w_base  （κ_t ∈ [min_kappa, 1.0]）
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# GP モジュール全般
# ─────────────────────────────────────────────────────────────────────────────
gp:
  enabled: true          # false にすると predict_mean_var は z_lin, NaN を返す
  n_factors: 6           # ファクタースコア次元数 K（変更禁止）
  n_sectors: 17          # JP 業種数 N_J（変更禁止）
  seed: 42               # 再現性のための乱数シード

# ─────────────────────────────────────────────────────────────────────────────
# カーネル設計（構造化カーネル: k_linear + α * k_nonlin）
# ─────────────────────────────────────────────────────────────────────────────
kernel:
  # k_linear: DotProduct カーネル（線形骨格を担う）
  linear_sigma0: 0.0               # sigma_0=0 → 純粋な内積（z_lin と等価）

  # α: 非線形項の寄与重み
  alpha_init: 0.10                 # 初期値（小さく設定）
  alpha_bounds: [1.0e-5, 0.50]     # 上限 0.50 → 線形骨格の支配を防ぐ

  # k_nonlin: 緩やかな非線形項（RBF with ARD）
  nonlinear_type: rbf              # "rbf" または "matern"
  matern_nu: 2.5                   # Matern 使用時の平滑度（1.5 or 2.5）

  # ARD 長さスケール（各ファクター次元に独立）
  length_scale_init: 1.0           # 初期値（全次元共通）
  length_scale_bounds: [0.30, 10.0]  # 下限 0.30 → 短距離過適合防止

  # 観測ノイズ
  noise_level_init: 0.01
  noise_bounds: [1.0e-5, 1.0]

# ─────────────────────────────────────────────────────────────────────────────
# 学習設定
# ─────────────────────────────────────────────────────────────────────────────
fitting:
  # ローリング窓（営業日数）: GPR の計算コスト O(n³) を考慮
  # 250: 約1年分。計算コストと統計的有効性のバランス点。
  # 120: 高速（初回確認用）。500: 高精度だがスパースGP推奨。
  window_size: 250

  # 周辺尤度最大化の再試行数
  # 多いほど良解を得やすいが線形に遅くなる
  n_restarts_optimizer: 3

  # スパース GP（誘導点近似）
  # window_size > 300 の場合に use_sparse_gp: true を推奨
  use_sparse_gp: false
  sparse_gp_inducing_points: 50    # 誘導点数（use_sparse_gp=true の場合）

# ─────────────────────────────────────────────────────────────────────────────
# 確信度スコア κ_t の算出
# ─────────────────────────────────────────────────────────────────────────────
confidence:
  # 業種横断集約方法
  # "mean"               : 全業種 σ² の平均（推奨）
  # "max"                : 最大 σ²（最も不確実な業種基準）
  # "portfolio_weighted" : |w_base| 加重平均
  aggregation: mean

  # 分散→確信度の写像関数
  # "inv_exp"            : κ = exp(-τ × σ²)（推奨・安定）
  # "percentile_rank"    : 過去σ²の分位で正規化（履歴が蓄積後に有効）
  mapping: inv_exp

  # inv_exp の減衰係数 τ
  # 大きいほど高分散日の κ_t が急激に低下する
  # 推奨範囲: 1.0（緩やか）〜 10.0（急峻）
  tau: 1.0

  # κ_t の EWMA スムージング半減期（営業日）
  # 0 でスムージングなし（生の κ_t をそのまま使用）
  smoothing_halflife: 5

  # κ_t の最小値（ゼロ除去）
  # 最高リスク日でもこの割合のエクスポージャーを維持
  min_kappa: 0.10

  # ベイズ的ウェイト縮小（μ/σ によるウェイト業種別縮小）
  # true にすると apply_bayesian_weight_shrinkage() を適用
  # false 推奨（シンプルな κ_t × w_base を先に評価）
  bayesian_weight: false

  # percentile_rank モード用の過去 σ² 参照窓
  percentile_window: 60

# ─────────────────────────────────────────────────────────────────────────────
# Walk-Forward 検証
# ─────────────────────────────────────────────────────────────────────────────
walk_forward:
  start_date: "2015-01-01"         # バックテスト開始日（IS + OOS 全体）
  oos_start_date: "2020-01-01"     # OOS（アウトオブサンプル）評価開始日
  gap_purge: 1                     # 予測対象重複除去日数
  embargo: 5                       # ウォームアップ除外日数
  min_train_size: 120              # 最小訓練サンプル数

# ─────────────────────────────────────────────────────────────────────────────
# 不確実性較正テスト
# ─────────────────────────────────────────────────────────────────────────────
calibration:
  # テストする予測区間の信頼水準
  coverage_levels: [0.80, 0.90, 0.95]

  # |実績カバレッジ - 期待カバレッジ| の警告閾値
  # この閾値を超えると WARN、2倍を超えると REJECT
  warn_threshold: 0.05

# ─────────────────────────────────────────────────────────────────────────────
# 取引コストモデル（既存 nonlinear_correction.yaml と同一設定を推奨）
# ─────────────────────────────────────────────────────────────────────────────
cost_model:
  commission_rate: 0.0005          # 片道手数料率（5bps）
  spread_rate: 0.0003              # スプレッドコスト（3bps）
  impact_rate: 0.0002              # マーケットインパクト（2bps）

# ─────────────────────────────────────────────────────────────────────────────
# 出力設定
# ─────────────────────────────────────────────────────────────────────────────
output:
  output_dir: "results/gp_walkforward"  # 結果出力ディレクトリ

# ─────────────────────────────────────────────────────────────────────────────
# 採用判定閾値
# ─────────────────────────────────────────────────────────────────────────────
# ADOPT 条件（すべて満たす必要あり）:
#   1. OOS コスト控除後 ネット R/R (GP) > ネット R/R (線形)
#   2. OOS 年率リターン (GP) ≥ 年率リターン (線形) × ar_tolerance
#      （ドローダウン低減が主目的なので ±5% 許容）
#   3. 80% 予測区間カバレッジが warn_threshold 内
#   4. 高ボラ局面の MDD (GP) < MDD (線形)
thresholds:
  ar_tolerance: 0.95               # AR(GP) ≥ AR(linear) × ar_tolerance
  significance_level: 0.05         # DSR p 値の有意水準
