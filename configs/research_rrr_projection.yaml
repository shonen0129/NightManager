model:
  name: sector_relative_ensemble_rrr
  display_name: "Sector Relative Ensemble with Reduced-Rank Regression"
  short_name: "SRE-RRR"

portfolio:
  long_short_frac: 0.3
  n_assets: 17
  weight_mode: signal
  net_target: 0.0

costs:
  slippage_bps_per_side: 5.0

residualization:
  enabled_for_p3: true
  jp_market_proxy: TOPIX
  beta_window: 60
  method: rolling_ols
  lookahead_safe: true

# Grids for validation
grids:
  rrr_window_grid:
    - 252
  ewma_halflife_grid:
    - 45
  rank_grid:
    - 2
    - 3
    - 4
    - 5
    - 6
  lambda_ridge_grid:
    - 0.01
    - 0.03
    - 0.1
    - 0.3
  lambda_prior_grid:
    - 0.1
    - 0.3
    - 1.0
    - 3.0
  rho_blp_grid:
    - 0.003
    - 0.03
  alpha_xx_grid:
    - 0.5
    - 0.75
  alpha_yx_grid:
    - 0.0
    - 0.25
  slippage_bps_grid:
    - 0.0
    - 5.0
    - 7.5
    - 10.0

