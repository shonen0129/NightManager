model:
  name: sector_relative_ensemble_blp_enhanced
  display_name: "Sector Relative Ensemble with Enhanced BLP"
  short_name: "SRE-BLPX"

portfolio:
  long_short_frac: 0.3
  n_assets: 17
  weight_mode: signal
  net_target: 0.0

costs:
  slippage_bps_per_side: 5.0

residualization:
  enabled_for_p3: true
  jp_market_proxy: TOPIX
  beta_window: 60
  method: rolling_ols
  lookahead_safe: true

grids:
  refined:
    blp_window_grid: [252]
    ewma_halflife_grid: [45]
    rho_grid: [0.001, 0.003, 0.005, 0.01, 0.03]
    alpha_xx_grid: [0.50, 0.65, 0.75, 0.85]
    alpha_yx_grid: [0.0, 0.05, 0.10, 0.25]
    alpha_yy_grid: [0.25, 0.50, 0.75]
    lambda_pca_grid: [0.10, 0.20, 0.25, 0.30, 0.40]
    lambda_sector_grid: [0.10, 0.20, 0.25, 0.30, 0.40]
    beta_conf_grid: [0.25, 0.50, 0.75, 1.00]
    winsor_sigma_grid: ["none", 5.0, 4.0, 3.5, 3.0]
    slippage_bps_grid: [0.0, 2.5, 5.0, 7.5, 10.0]
    exec_adjustment_grid: ["none"]

ensembles:
  - name: SRE_current
    raw_pca: 0.50
    residual_pca: 0.50
    raw_blpx: 0.00
    residual_blpx: 0.00
  - name: BLP_prev_Hybrid_20
    raw_pca: 0.40
    residual_pca: 0.40
    raw_blpx: 0.10
    residual_blpx: 0.10
  - name: BLPX_SRE
    raw_pca: 0.00
    residual_pca: 0.00
    raw_blpx: 0.50
    residual_blpx: 0.50
  - name: Hybrid_BLPX_20
    raw_pca: 0.40
    residual_pca: 0.40
    raw_blpx: 0.10
    residual_blpx: 0.10
  - name: Hybrid_BLPX_25
    raw_pca: 0.375
    residual_pca: 0.375
    raw_blpx: 0.125
    residual_blpx: 0.125
  - name: Hybrid_BLPX_50
    raw_pca: 0.25
    residual_pca: 0.25
    raw_blpx: 0.25
    residual_blpx: 0.25
  - name: Raw-BLPX_only
    raw_pca: 0.00
    residual_pca: 0.00
    raw_blpx: 1.00
    residual_blpx: 0.00
  - name: Residual-BLPX_only
    raw_pca: 0.00
    residual_pca: 0.00
    raw_blpx: 0.00
    residual_blpx: 1.00

# Model-level blends are handled programmatically in the script
blends:
  - weight: 0.00
    name: SRE_BLPX_BLEND_00
  - weight: 0.10
    name: SRE_BLPX_BLEND_10
  - weight: 0.20
    name: SRE_BLPX_BLEND_20
  - weight: 0.25
    name: SRE_BLPX_BLEND_25
  - weight: 0.33
    name: SRE_BLPX_BLEND_33
  - weight: 0.40
    name: SRE_BLPX_BLEND_40
  - weight: 0.50
    name: SRE_BLPX_BLEND_50
  - weight: 0.67
    name: SRE_BLPX_BLEND_67
  - weight: 1.00
    name: SRE_BLPX_BLEND_100
